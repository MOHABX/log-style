<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        *{
            color: #fff;
            box-sizing: border-box;
        }
        body{
            margin: 0;
            padding: 0;
            width: 100%;
            height:100vh;
            background-image: url("./image.png");
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            
        }
        .container{
            width: 80%;
            height: 500px;
            margin: 15px;
            padding: 10px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.290);
            background-image: url("image.png");
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            box-shadow: 0px 0px 80px 10px white;
        }
        .container .right{
            width: 60%;
            text-transform: uppercase;
        }
        .container .left{
           
            width: 40%;
            gap: 15px;
            text-align: center;
            height: 100%;
            
        }
        .container .left form{ 
            background-color: rgba(255, 255, 255, 0.235);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
        }
        .container .left form input{
            width: 100%;
            height: 35px;
            border-radius: 15px;
            border: none;
            margin: 3px;
            padding: 10px;
        }
        #nones-inputs{
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="right">
            <h1>Lorem ipsum dolor sit.</h1>
            <p>
                Lorem ipsum dolor sit amet 
                consectetur adipisicing elit. 
                Error, ipsum.
            </p>
        </div>
        <div class="left">
            <form action="xx">
                <div class="inputs">
                    <label for="name">name</label>
                    <br>
                    <input placeholder="name" type="text">
                    <br>
                    <label  for="email">email</label>
                    <br>
                    <input placeholder="email" type="email">
                    <br>
                    <!-- == -->
                    <div id="nones-inputs" class="nones-inputs">      
                    <br>
                    <label  for="exp">exp yers</label>
                    <br>
                    <input placeholder="exp yers" type="number">
                    <br>
                    <br>
                    <label  for="track">track</label>
                    <br>
                    <input placeholder="track" type="text">
                    <br>
                    </div>
                    <!-- == -->

                    <label for="pasword">pasword</label>
                    <br>
                    <input placeholder="password" type="password">
                    <br>
                    <label for="name">conferm pasword</label>
                    <br>
                    <input placeholder="conferm apassword" type="password">
                    <br>
                    <button type="reset">log in </button>
                    <br>
                    <span onclick="iam_tet()">iam a tetcher</span>
                </div>
            </form>
        </div>
    </div>
    <script>
        function iam_tet(){
            document.getElementById("nones-inputs").style.display = "block";
        }
    </script>
</body>
</html>
